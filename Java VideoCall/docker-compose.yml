services:
  postgres:
    image: postgres:15
    container_name: logoped-postgres
    environment:
      POSTGRES_DB: logoped_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - logoped-network

volumes:
  postgres_data:

networks:
  logoped-network:
    driver: bridge
